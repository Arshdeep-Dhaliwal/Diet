<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --card: #111827;
  --card-border: rgba(255,255,255,.06);
  --card-hover: #161f30;
  --text: #f0f2f7;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --green: #34d399;
  --green-bg: rgba(52,211,153,.1);
  --orange: #fbbf24;
  --orange-bg: rgba(251,191,36,.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.1);
  --teal: #2dd4bf;
  --teal-bg: rgba(45,212,191,.1);
  --gray: #94a3b8;
  --gray-bg: rgba(148,163,184,.08);
  --mono: "JetBrains Mono", monospace;
  --sans: "Inter", -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px);
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
}

/* ── Today Header ── */
.today-header {
  padding: 20px 0 12px;
}
.today-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.today-greeting {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -.03em;
  margin-top: 2px;
}
.today-cycle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--mono);
}
.today-cycle.omad { background: var(--green-bg); color: var(--green); }
.today-cycle.fast { background: var(--orange-bg); color: var(--orange); }
.cycle-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}

/* ── Day Selector (horizontal scroll) ── */
.day-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 4px 0 8px;
  margin: 8px -16px 0;
  padding-left: 16px;
  padding-right: 16px;
}
.day-selector::-webkit-scrollbar { display: none; }
.day-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--card-border);
  background: transparent;
  color: var(--text-3);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  min-width: 56px;
}
.day-btn strong {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-2);
}
.day-btn.active {
  background: var(--card);
  border-color: var(--blue);
  color: var(--blue);
}
.day-btn.active strong { color: var(--text); }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  margin-top: 12px;
  overflow: hidden;
}
.card-tap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
.card-tap:active { background: var(--card-hover); }
.card-icon {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.card-icon.workout { background: var(--blue-bg); }
.card-icon.meal { background: var(--green-bg); }
.card-icon.timeline { background: var(--orange-bg); }
.card-icon.supps { background: var(--teal-bg); }
.card-icon.fast-icon { background: var(--orange-bg); }
.card-icon.rules { background: var(--gray-bg); }
.card-info { flex: 1; min-width: 0; }
.card-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
}
.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 1px;
}
.card-chevron {
  flex-shrink: 0;
  width: 20px; height: 20px;
  color: var(--text-3);
  transition: transform .2s ease;
}
.card.open .card-chevron { transform: rotate(180deg); }

.card-body {
  display: none;
  padding: 0 16px 16px;
}
.card.open .card-body { display: block; animation: slideIn .2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.card-divider {
  height: 1px;
  background: var(--card-border);
  margin: 0 16px;
}

/* ── Exercise rows ── */
.ex-row {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  align-items: flex-start;
}
.ex-row:last-child { border-bottom: none; }
.ex-sets {
  flex-shrink: 0;
  width: 64px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  padding-top: 2px;
}
.ex-name { font-size: 14px; font-weight: 600; }
.ex-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.ex-tag {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-3);
  padding-top: 3px;
}

/* ── Timeline rows ── */
.tl-row {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  align-items: flex-start;
}
.tl-row:last-child { border-bottom: none; }
.tl-time {
  flex-shrink: 0;
  width: 64px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  padding-top: 1px;
}
.tl-text { font-size: 14px; font-weight: 600; }
.tl-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.tl-row.highlight .tl-text { color: var(--text); }
.tl-row:not(.highlight) .tl-text { color: var(--text-2); }

/* ── Meal steps ── */
.meal-step {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.meal-step:last-child { border-bottom: none; }
.meal-num {
  flex-shrink: 0;
  width: 20px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
}
.meal-name { font-size: 14px; font-weight: 600; }
.meal-desc { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.meal-macro {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  padding-top: 3px;
  text-align: right;
}

/* ── Supplement rows ── */
.supp-row2 {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.supp-row2:last-child { border-bottom: none; }
.supp-dose2 {
  flex-shrink: 0;
  width: 70px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
}
.supp-name { font-size: 14px; font-weight: 600; }
.supp-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }

/* ── Protein rotation ── */
.protein-day {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.protein-day:last-child { border-bottom: none; }
.protein-badge {
  flex-shrink: 0;
  width: 36px;
  height: 22px;
  border-radius: 6px;
  background: var(--green-bg);
  color: var(--green);
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
}
.protein-info { flex: 1; }
.protein-name { font-size: 14px; font-weight: 600; }
.protein-detail { font-size: 12px; color: var(--text-2); }
.protein-stats { flex-shrink: 0; font-family: var(--mono); font-size: 11px; color: var(--text-3); text-align: right; }

/* ── Links ── */
.learn-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  text-decoration: none;
  color: var(--text);
  transition: background .12s;
}
.learn-link:active { background: var(--card-hover); }
.learn-link-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--red-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.learn-link-text { flex: 1; min-width: 0; }
.learn-link-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.learn-link-source { font-size: 11px; color: var(--text-3); }
.learn-link-go { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .04em; }

/* ── Why card (coaching note) ── */
.why-box {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,.02);
}
.why-label {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 4px;
}
.why-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }

/* ── Section dividers ── */
.section-break {
  margin: 28px 0 4px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
}

/* ── 48hr fast card ── */
.fast-timeline li {
  list-style: none;
  padding: 6px 0;
  font-size: 13px;
  color: var(--text-2);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.fast-timeline li:last-child { border-bottom: none; }
.fast-timeline strong { color: var(--text); }

/* ── Bottom sections (math, milestones, rules) ── */
.bottom-section { margin-top: 24px; }

.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 14px;
}
.metric-row:last-child { border-bottom: none; }
.metric-label2 { color: var(--text-2); }
.metric-val { font-weight: 700; font-family: var(--mono); font-size: 13px; }

.milestone-row2 {
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.milestone-row2:last-child { border-bottom: none; }
.milestone-month {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.milestone-target { font-size: 14px; font-weight: 700; margin-top: 2px; }
.milestone-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }

.rule-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.rule-item:last-child { border-bottom: none; }
.rule-num {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  width: 24px;
}
.rule-text { font-size: 13px; }
.rule-text strong { display: block; }
.rule-text span { color: var(--text-2); }

/* ── Cycle visual (small) ── */
.mini-cycle {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}
.mini-dot {
  flex: 1;
  height: 6px;
  border-radius: 3px;
}
.mini-dot.omad { background: var(--green); opacity: .6; }
.mini-dot.fast { background: var(--orange); opacity: .8; }

/* ── Stats row ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.stat-chip {
  padding: 12px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  text-align: center;
}
.stat-val {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.03em;
}
.stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-top: 2px;
}

/* ── Footer ── */
.app-footer {
  margin-top: 32px;
  padding: 16px 0;
  border-top: 1px solid var(--card-border);
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.8;
}

/* ── Training dist ── */
.dist-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.dist-row:last-child { border-bottom: none; }
.dist-label { font-size: 13px; color: var(--text-2); }
.dist-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }

/* ── Week-to-Date Tracker ── */
.wtd-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 0 16px 16px;
}
.wtd-tile {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--card-border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s, transform .08s;
}
.wtd-tile:active {
  background: rgba(255,255,255,.05);
  transform: scale(.98);
}
.wtd-tile-head {
  display: flex;
  align-items: center;
  gap: 6px;
}
.wtd-tile-icon { font-size: 14px; }
.wtd-tile-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.wtd-tile-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 800;
  margin-top: 6px;
  letter-spacing: -.03em;
  line-height: 1.1;
}
.wtd-tile-unit {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
  margin-left: 4px;
}
.wtd-tile-target {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 4px;
  font-family: var(--mono);
  font-weight: 600;
}
.wtd-bar {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.06);
  margin-top: 8px;
  overflow: hidden;
}
.wtd-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .3s ease;
}

/* ── Bottom Sheet ── */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .65);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
  z-index: 100;
}
.sheet-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}
.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--card);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--card-border);
  padding: 12px 16px calc(env(safe-area-inset-bottom) + 24px);
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.2, .9, .3, 1);
  max-height: 88vh;
  overflow-y: auto;
  z-index: 101;
  -webkit-overflow-scrolling: touch;
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--text-3);
  border-radius: 2px;
  margin: 0 auto 14px;
  opacity: .35;
}
.sheet-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.02em;
}
.sheet-sub {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 4px;
}
.sheet-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin: 20px 0 10px;
}
.preset-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.preset-btn {
  padding: 14px 6px;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: rgba(255,255,255,.02);
  color: var(--text);
  font-family: var(--mono);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all .12s;
}
.preset-btn:active {
  background: var(--card-hover);
  border-color: var(--blue);
  transform: scale(.96);
}
.custom-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.custom-input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: rgba(255,255,255,.03);
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  outline: none;
  -webkit-appearance: none;
  min-width: 0;
}
.custom-input:focus { border-color: var(--blue); }
.custom-input::placeholder { color: var(--text-3); font-weight: 500; }
.add-btn {
  padding: 14px 22px;
  border-radius: 10px;
  border: none;
  background: var(--blue);
  color: var(--bg);
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .12s;
}
.add-btn:active { opacity: .75; }
.add-btn.ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--card-border);
  width: 100%;
  margin-top: 18px;
}
.log-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.log-entry:last-child { border-bottom: none; }
.log-val {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  flex: 1;
}
.log-time {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
}
.log-del {
  background: transparent;
  border: none;
  color: var(--red);
  cursor: pointer;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  -webkit-tap-highlight-color: transparent;
}
.log-empty {
  font-size: 13px;
  color: var(--text-3);
  padding: 14px 0;
  text-align: center;
}
</style>
</head>
<body>

<div class="app" id="app"></div>

<!-- ── Bottom Sheet for Quick-Add ── -->
<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
// ── ALL DATA ──
const DAYS_OF_WEEK = ['sun','mon','tue','wed','thu','fri','sat'];
const DAY_LABELS = { mon:'Mon', tue:'Tue', wed:'Wed', thu:'Thu', fri:'Fri', sat:'Sat', sun:'Sun' };
const DAY_TYPES = {
  mon: { type:'Push', color:'red', icon:'\u{1F3CB}️', time:'5:30–6:30 AM' },
  tue: { type:'Zone 2', color:'blue', icon:'\u{1F6B6}', time:'5:30–6:15 AM' },
  wed: { type:'Pull', color:'teal', icon:'\u{1F3CB}️', time:'5:30–6:30 AM' },
  thu: { type:'Zone 2', color:'blue', icon:'\u{1F6B6}', time:'5:30–6:15 AM' },
  fri: { type:'Functional', color:'orange', icon:'\u{1F4AA}', time:'5:30–6:30 AM' },
  sat: { type:'Rest', color:'gray', icon:'\u{1F634}', time:'Recovery day' },
  sun: { type:'VO2 + Zone 2', color:'red', icon:'\u{1F4A8}', time:'Flexible AM' }
};

const WORKOUTS = {
  mon: {
    title: 'Full Body Push',

const WTD_METRICS = {
  zone2:   { label:'Zone 2',     icon:'\u{1F6B6}', unit:'min',  target:120, color:'blue',   presets:[15, 30, 45, 60] },
  vo2:     { label:'VO2 Max',    icon:'\u{1F4A8}', unit:'min',  target:30,  color:'red',    presets:[4, 8, 16, 30] },
  pushups: { label:'Push-ups',   icon:'\u{1F4AA}', unit:'reps', target:100, color:'teal',   presets:[10, 20, 50, 100] },
  pullups: { label:'Pull-ups',   icon:'\u{1F9D7}', unit:'reps', target:100, color:'green',  presets:[5, 10, 15, 25] },
  bwsquat: { label:'BW Squats',  icon:'\u{1F9B5}', unit:'reps', target:500, color:'orange', presets:[25, 50, 100, 200] }
};
const METRIC_ORDER = ['zone2', 'vo2', 'pushups', 'pullups', 'bwsquat'];
const WTD_KEY = 'wtd-tracker-v1';

function loadWtd() {
  try {
    var raw = localStorage.getItem(WTD_KEY);
    if (!raw) return { logs: [] };
    var parsed = JSON.parse(raw);
    if (!parsed.logs) parsed.logs = [];
    return parsed;
  } catch (e) {
    return { logs: [] };
  }
}
function saveWtd(state) {
  try { localStorage.setItem(WTD_KEY, JSON.stringify(state)); } catch (e) {}
}
function getWeekStart(d) {
  d = d ? new Date(d) : new Date();
  d.setHours(0, 0, 0, 0);
  var day = d.getDay();
  var diff = day === 0 ? -6 : 1 - day; // Monday-based week
  d.setDate(d.getDate() + diff);
  return d;
}
function isThisWeek(ts) {
  var start = getWeekStart();
  var end = new Date(start);
  end.setDate(end.getDate() + 7);
  return ts >= start.getTime() && ts < end.getTime();
}
function weekRangeLabel() {
  var s = getWeekStart();
  var e = new Date(s);
  e.setDate(e.getDate() + 6);
  function fmt(d) { return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
  return fmt(s) + ' – ' + fmt(e);
}
function weekTotal(metric) {
  return loadWtd().logs
    .filter(function(l) { return l.metric === metric && isThisWeek(l.ts); })
    .reduce(function(a, l) { return a + (Number(l.value) || 0); }, 0);
}
function thisWeekEntries(metric) {
  return loadWtd().logs
    .filter(function(l) { return l.metric === metric && isThisWeek(l.ts); })
    .sort(function(a, b) { return b.ts - a.ts; });
}
function addLog(metric, value) {
  var state = loadWtd();
  state.logs.push({
    id: 'l' + Date.now() + Math.random().toString(36).slice(2, 6),
    ts: Date.now(),
    metric: metric,
    value: Number(value)
  });
  saveWtd(state);
}
function removeLog(id) {
  var state = loadWtd();
  state.logs = state.logs.filter(function(l) { return l.id !== id; });
  saveWtd(state);
}

function renderWtdCard() {
  var html = '<div class="card open" id="card-wtd">';
  html += '<div class="card-tap" onclick="toggle(\'card-wtd\')">';
  html += '<div class="card-icon" style="background:var(--blue-bg)">\u{1F4C5}</div>';
  html += '<div class="card-info"><div class="card-label">Week-to-Date · ' + weekRangeLabel() + '</div>';
  html += '<div class="card-title">Tap a tile to log</div></div>';
  html += chevronSVG() + '</div><div class="card-divider"></div>';
  html += '<div class="wtd-grid">';
  for (var i = 0; i < METRIC_ORDER.length; i++) {
    var key = METRIC_ORDER[i];
    var m = WTD_METRICS[key];
    var total = weekTotal(key);
    var pct = m.target ? Math.min(100, Math.round(total / m.target * 100)) : 0;
    html += '<div class="wtd-tile" onclick="openSheet(\'' + key + '\')">';
    html += '<div class="wtd-tile-head"><span class="wtd-tile-icon">' + m.icon + '</span>';
    html += '<span class="wtd-tile-label">' + m.label + '</span></div>';
    html += '<div class="wtd-tile-val" style="color:var(--' + m.color + ')">' + total.toLocaleString() + '<span class="wtd-tile-unit">' + m.unit + '</span></div>';
    html += '<div class="wtd-tile-target">' + pct + '% of ' + m.target.toLocaleString() + '</div>';
    html += '<div class="wtd-bar"><div class="wtd-bar-fill" style="width:' + pct + '%;background:var(--' + m.color + ')"></div></div>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

// ── Bottom Sheet ──
var activeSheetMetric = null;
function openSheet(metric) {
  activeSheetMetric = metric;
  renderSheet();
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
  activeSheetMetric = null;
}
function renderSheet() {
  var sheet = document.getElementById('sheet');
  if (!activeSheetMetric) { sheet.innerHTML = ''; return; }
  var m = WTD_METRICS[activeSheetMetric];
  var total = weekTotal(activeSheetMetric);
  var entries = thisWeekEntries(activeSheetMetric);
  var pct = m.target ? Math.min(100, Math.round(total / m.target * 100)) : 0;

  var h = '<div class="sheet-handle"></div>';
  h += '<div class="sheet-title">' + m.icon + '  ' + m.label + '</div>';
  h += '<div class="sheet-sub">This week: <strong style="color:var(--' + m.color + ')">' + total.toLocaleString() + ' ' + m.unit + '</strong> · ' + pct + '% of ' + m.target.toLocaleString() + ' target</div>';

  h += '<div class="sheet-section-label">Quick Add</div>';
  h += '<div class="preset-grid">';
  for (var i = 0; i < m.presets.length; i++) {
    h += '<button class="preset-btn" onclick="quickAdd(' + m.presets[i] + ')">+' + m.presets[i] + '</button>';
  }
  h += '</div>';

  h += '<div class="custom-row">';
  h += '<input class="custom-input" id="custom-val" type="number" inputmode="numeric" placeholder="Custom ' + m.unit + '">';
  h += '<button class="add-btn" onclick="customAdd()">Add</button>';
  h += '</div>';

  h += '<div class="sheet-section-label">This Week\'s Log (' + entries.length + ')</div>';
  if (entries.length === 0) {
    h += '<div class="log-empty">No entries yet. Tap a preset above to log your first.</div>';
  } else {
    for (var j = 0; j < entries.length; j++) {
      var e = entries[j];
      var d = new Date(e.ts);
      var dayLabel = d.toLocaleDateString('en-US', { weekday:'short' });
      var timeLabel = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      h += '<div class="log-entry">';
      h += '<div class="log-val" style="color:var(--' + m.color + ')">+' + e.value.toLocaleString() + ' <span style="color:var(--text-3);font-weight:500">' + m.unit + '</span></div>';
      h += '<div class="log-time">' + dayLabel + ' · ' + timeLabel + '</div>';
      h += '<button class="log-del" onclick="delLog(\'' + e.id + '\')">Remove</button>';
      h += '</div>';
    }
  }

  h += '<button class="add-btn ghost" onclick="closeSheet()">Close</button>';
  sheet.innerHTML = h;
}
function quickAdd(v) {
  if (!activeSheetMetric) return;
  addLog(activeSheetMetric, v);
  renderSheet();
  refreshWtdTiles();
}
function customAdd() {
  if (!activeSheetMetric) return;
  var inp = document.getElementById('custom-val');
  var v = Number(inp.value);
  if (!v || v <= 0) return;
  addLog(activeSheetMetric, v);
  inp.value = '';
  renderSheet();
  refreshWtdTiles();
}
function delLog(id) {
  removeLog(id);
  renderSheet();
  refreshWtdTiles();
}
// Refresh just the WTD card so we don't blow away the bottom sheet or scroll position
function refreshWtdTiles() {
  var card = document.getElementById('card-wtd');
  if (!card) return;
  var wasOpen = card.classList.contains('open');
  var wrap = document.createElement('div');
  wrap.innerHTML = renderWtdCard();
  var newCard = wrap.firstChild;
  if (!wasOpen) newCard.classList.remove('open');
  card.parentNode.replaceChild(newCard, card);
}

function render() {
  var day = DAY_TYPES[activeDay];

  // Header

  // Stats

  // Timeline card

  html += '<li>All day: water + electrolytes, salt in every glass</li>';
  html += '<li>Evening: herbal tea + magnesium before bed</li></ul>';

  html += '<li><strong>OK:</strong> Water, black coffee, green tea, herbal tea, electrolytes, ACV in water</li>';

  html += chevronSVG() + '</div><div class="card-divider"></div><div class="card-body">';

  html += '<div class="why-box" style="border-color:rgba(251,191,36,.15)"><div class="why-label">Monitoring Rule</div><div class="why-text">This is aggressive. Monitor energy, sleep, mood. If any deteriorate, add a refeed week every 4th cycle.</div></div>';
  html += '</div></div></div>';

  // Training distribution card
  html += '<div class="bottom-section" style="margin-top:12px"><div class="card" id="card-training-dist"><div class="card-tap" onclick="toggle(\'card-training-dist\')">';
  html += '<div class="card-icon" style="background:var(--blue-bg)">\u{1F4C8}</div>';
  html += '<div class="card-info"><div class="card-label">Weekly Plan</div>';
  html += '<div class="card-title">~6.75 hrs / 6 Training Days</div></div>';
  html += chevronSVG() + '</div><div class="card-divider"></div><div class="card-body">';
  html += '<div class="dist-row"><div class="dist-label">Zone 2 Cardio (Tue/Thu/Sun)</div><div class="dist-val">135 min</div></div>';
  html += '<div class="dist-row"><div class="dist-label">VO2 Max Intervals (Sun)</div><div class="dist-val">45 min</div></div>';
  html += '<div class="dist-row"><div class="dist-label">Strength (Mon Push / Wed Pull)</div><div class="dist-val">120 min</div></div>';
  html += '<div class="dist-row"><div class="dist-label">Functional Strength (Fri)</div><div class="dist-val">60 min</div></div>';
  html += '</div></div></div>';

  // Milestones card
  html += '<div class="bottom-section" style="margin-top:12px"><div class="card" id="card-milestones"><div class="card-tap" onclick="toggle(\'card-milestones\')">';
  html += '<div class="card-icon" style="background:var(--orange-bg)">\u{1F3AF}</div>';
  html += '<div class="card-info"><div class="card-label">6-Month Glide Path</div>';
  html += '<div class="card-title">Monthly Milestones</div></div>';
  html += chevronSVG() + '</div><div class="card-divider"></div><div class="card-body">';
  for (var ms = 0; ms < MILESTONES.length; ms++) {
    var mi = MILESTONES[ms];
    html += '<div class="milestone-row2"><div class="milestone-month">' + mi.month + '</div>';
    html += '<div class="milestone-target">' + mi.target + '</div>';
    html += '<div class="milestone-note">' + mi.note + '</div></div>';
  }
  html += '</div></div></div>';

  // Footer
  html += '<footer class="app-footer">';
  html += 'Based on InBody — Aug 28, 2025 — 90.3 kg — 30.7% BF — BMR 1722 kcal<br>';
  html += 'Current: 95 kg (April 2026)<br>';
  html += 'Protocol: Dr. Pradip Jamnadas 9+2<br>';
  html += 'Reassess month 3 with InBody scan</footer>';

  app.innerHTML = html;

  // Bind day selector
  var dayBtns = document.querySelectorAll('.day-btn');
  for (var b = 0; b < dayBtns.length; b++) {
    dayBtns[b].addEventListener('click', function() {
      activeDay = this.dataset.day;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
}

function toggle(id) {
  var card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

render();
</script>
