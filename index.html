<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --card: #111827;
  --card-border: rgba(255,255,255,.06);
  --card-hover: #161f30;
  --text: #f0f2f7;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --green: #34d399;
  --green-bg: rgba(52,211,153,.1);
  --orange: #fbbf24;
  --orange-bg: rgba(251,191,36,.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.1);
  --teal: #2dd4bf;
  --teal-bg: rgba(45,212,191,.1);
  --gray: #94a3b8;
  --gray-bg: rgba(148,163,184,.08);
  --mono: "JetBrains Mono", monospace;
  --sans: "Inter", -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px);
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
}

/* ── Today Header ── */
.today-header {
  padding: 20px 0 12px;
}
.today-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.today-greeting {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -.03em;
  margin-top: 2px;
}
.today-cycle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--mono);
}
.today-cycle.omad { background: var(--green-bg); color: var(--green); }
.today-cycle.fast { background: var(--orange-bg); color: var(--orange); }
.cycle-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}

/* ── Day Selector (horizontal scroll) ── */
.day-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 4px 0 8px;
  margin: 8px -16px 0;
  padding-left: 16px;
  padding-right: 16px;
}
.day-selector::-webkit-scrollbar { display: none; }
.day-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--card-border);
  background: transparent;
  color: var(--text-3);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  min-width: 56px;
}
.day-btn strong {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-2);
}
.day-btn.active {
  background: var(--card);
  border-color: var(--blue);
  color: var(--blue);
}
.day-btn.active strong { color: var(--text); }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  margin-top: 12px;
  overflow: hidden;
}
.card-tap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
.card-tap:active { background: var(--card-hover); }
.card-icon {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.card-icon.workout { background: var(--blue-bg); }
.card-icon.meal { background: var(--green-bg); }
.card-icon.timeline { background: var(--orange-bg); }
.card-icon.supps { background: var(--teal-bg); }
.card-icon.fast-icon { background: var(--orange-bg); }
.card-icon.rules { background: var(--gray-bg); }
.card-info { flex: 1; min-width: 0; }
.card-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
}
.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 1px;
}
.card-chevron {
  flex-shrink: 0;
  width: 20px; height: 20px;
  color: var(--text-3);
  transition: transform .2s ease;
}
.card.open .card-chevron { transform: rotate(180deg); }

.card-body {
  display: none;
  padding: 0 16px 16px;
}
.card.open .card-body { display: block; animation: slideIn .2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.card-divider {
  height: 1px;
  background: var(--card-border);
  margin: 0 16px;
}

/* ── Exercise rows ── */
.ex-row {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  align-items: flex-start;
}
.ex-row:last-child { border-bottom: none; }
.ex-sets {
  flex-shrink: 0;
  width: 64px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  padding-top: 2px;
}
.ex-name { font-size: 14px; font-weight: 600; }
.ex-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.ex-tag {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-3);
  padding-top: 3px;
}

/* ── Timeline rows ── */
.tl-row {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  align-items: flex-start;
}
.tl-row:last-child { border-bottom: none; }
.tl-time {
  flex-shrink: 0;
  width: 64px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  padding-top: 1px;
}
.tl-text { font-size: 14px; font-weight: 600; }
.tl-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.tl-row.highlight .tl-text { color: var(--text); }
.tl-row:not(.highlight) .tl-text { color: var(--text-2); }

/* ── Meal steps ── */
.meal-step {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.meal-step:last-child { border-bottom: none; }
.meal-num {
  flex-shrink: 0;
  width: 20px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
}
.meal-name { font-size: 14px; font-weight: 600; }
.meal-desc { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.meal-macro {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  padding-top: 3px;
  text-align: right;
}

/* ── Supplement rows ── */
.supp-row2 {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.supp-row2:last-child { border-bottom: none; }
.supp-dose2 {
  flex-shrink: 0;
  width: 70px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
}
.supp-name { font-size: 14px; font-weight: 600; }
.supp-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }

/* ── Protein rotation ── */
.protein-day {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.protein-day:last-child { border-bottom: none; }
.protein-badge {
  flex-shrink: 0;
  width: 36px;
  height: 22px;
  border-radius: 6px;
  background: var(--green-bg);
  color: var(--green);
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
}
.protein-info { flex: 1; }
.protein-name { font-size: 14px; font-weight: 600; }
.protein-detail { font-size: 12px; color: var(--text-2); }
.protein-stats { flex-shrink: 0; font-family: var(--mono); font-size: 11px; color: var(--text-3); text-align: right; }

/* ── Links ── */
.learn-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  text-decoration: none;
  color: var(--text);
  transition: background .12s;
}
.learn-link:active { background: var(--card-hover); }
.learn-link-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--red-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.learn-link-text { flex: 1; min-width: 0; }
.learn-link-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.learn-link-source { font-size: 11px; color: var(--text-3); }
.learn-link-go { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .04em; }

/* ── Why card (coaching note) ── */
.why-box {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,.02);
}
.why-label {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 4px;
}
.why-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }

/* ── Section dividers ── */
.section-break {
  margin: 28px 0 4px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
}

/* ── 48hr fast card ── */
.fast-timeline li {
  list-style: none;
  padding: 6px 0;
  font-size: 13px;
  color: var(--text-2);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.fast-timeline li:last-child { border-bottom: none; }
.fast-timeline strong { color: var(--text); }

/* ── Bottom sections (math, milestones, rules) ── */
.bottom-section { margin-top: 24px; }

.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 14px;
}
.metric-row:last-child { border-bottom: none; }
.metric-label2 { color: var(--text-2); }
.metric-val { font-weight: 700; font-family: var(--mono); font-size: 13px; }

.milestone-row2 {
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.milestone-row2:last-child { border-bottom: none; }
.milestone-month {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.milestone-target { font-size: 14px; font-weight: 700; margin-top: 2px; }
.milestone-note { font-size: 12px; color: var(--text-2); margin-top: 1px; }

.rule-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.rule-item:last-child { border-bottom: none; }
.rule-num {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  width: 24px;
}
.rule-text { font-size: 13px; }
.rule-text strong { display: block; }
.rule-text span { color: var(--text-2); }

/* ── Cycle visual (small) ── */
.mini-cycle {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}
.mini-dot {
  flex: 1;
  height: 6px;
  border-radius: 3px;
}
.mini-dot.omad { background: var(--green); opacity: .6; }
.mini-dot.fast { background: var(--orange); opacity: .8; }

/* ── Stats row ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.stat-chip {
  padding: 12px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  text-align: center;
}
.stat-val {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.03em;
}
.stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-top: 2px;
}

/* ── Footer ── */
.app-footer {
  margin-top: 32px;
  padding: 16px 0;
  border-top: 1px solid var(--card-border);
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.8;
}

/* ── Training dist ── */
.dist-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.dist-row:last-child { border-bottom: none; }
.dist-label { font-size: 13px; color: var(--text-2); }
.dist-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }
</style>
</head>

      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
}

function toggle(id) {
  var card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

render();
</script>
</body>
</html>
